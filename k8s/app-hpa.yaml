apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: driftly-app-hpa
  namespace: driftly
  labels:
    app.kubernetes.io/name: driftly-app
    app.kubernetes.io/part-of: driftly
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: driftly-app
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

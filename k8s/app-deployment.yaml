apiVersion: apps/v1
kind: Deployment
metadata:
  name: driftly-app
  namespace: driftly
  labels:
    app.kubernetes.io/name: driftly-app
    app.kubernetes.io/part-of: driftly
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: driftly-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: driftly-app
        app.kubernetes.io/part-of: driftly
    spec:
      containers:
        - name: driftly-app
          image: driftly:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: driftly-config
            - secretRef:
                name: driftly-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"